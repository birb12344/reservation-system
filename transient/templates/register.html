{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="mb-3"><i class="bi bi-person-plus"></i> Create Account</h3>
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-bold">Full Name</label>
            <input name="full_name" class="form-control form-control-lg" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Email</label>
            <input type="email" name="email" class="form-control form-control-lg" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Phone</label>
            <input name="phone" class="form-control form-control-lg">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Password</label>
            <input type="password" name="password" class="form-control form-control-lg" required>
          </div>
          <button class="btn btn-brand big-btn w-100">Register</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
