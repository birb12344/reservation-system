{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="mb-3"><i class="bi bi-box-arrow-in-right"></i> Guest Login</h3>
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-bold">Email</label>
            <input type="email" name="email" class="form-control form-control-lg" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Password</label>
            <input type="password" name="password" class="form-control form-control-lg" required>
          </div>
          <button class="btn btn-brand big-btn w-100">Login</button>
        </form>
        <hr>
        <p class="mb-0">No account? <a href="{{ url_for('register') }}">Register here</a></p>
        <small class="text-muted">Demo guest: guest@example.com / guest123</small>
      </div>
    </div>
  </div>
</div>
{% endblock %}
